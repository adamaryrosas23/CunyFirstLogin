<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recover Username</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      font-family: system-ui, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header */
    .cuny-header {
      width: 100%;
      background: #0033a0;
      padding: 15px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-sizing: border-box;
    }

    .cuny-logo-img {
      height: 38px;
      width: auto;
      display: block;
    }

    /* Page Content */
    .page-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
    }

    /* Main box */
    .box {
      background: white;
      padding: 2rem;
      width: 360px;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 1rem;
      color: #0033a0;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
    }

    label {
      font-size: 14px;
      color: #0033a0;
      font-weight: 600;
      display: block;
      margin-top: 1rem;
    }

    input {
      width: 100%;
      padding: 0.8rem;
      margin-top: 0.4rem;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 0.85rem;
      margin-top: 1.2rem;
      background: #0033a0;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 17px;
      cursor: pointer;
    }

    button:hover {
      background: #002a85;
    }

    .error {
      color: #d00;
      margin-top: 1rem;
      text-align: center;
      font-weight: 600;
    }

    /* FOOTER */
    .cuny-footer {
      width: 100%;
      background: #0033a0;
      color: white;
      padding: 20px 25px;
      box-sizing: border-box;
      margin-top: auto;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .footer-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: white;
      text-decoration: none;
      font-size: 12px;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    .footer-copy {
      text-align: center;
      font-size: 13px;
      line-height: 1.4;
      flex: 1;
    }

    .footer-social {
      display: flex;
      gap: 18px;
    }

    .footer-social i {
      font-size: 20px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .footer-social i:hover {
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <header class="cuny-header">
    <img src="cuny-logo.webp" class="cuny-logo-img">
  </header>

  <div class="page-content">
    <div class="box">
      <h2>Recover Username</h2>

      <form onsubmit="event.preventDefault(); startRecovery();">
        <label>Email</label>
        <input id="email" type="email" required>

        <button>Send Code</button>
      </form>

      <div id="msg"></div>
    </div>
  </div>

  <script>
    async function startRecovery() {
      const email = document.getElementById("email").value.trim();
      const msg = document.getElementById("msg");

      msg.innerHTML = "";

      const res = await fetch("/api/recover-username", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });

      const data = await res.json();

      if (data.status === "mfa_required") {
        localStorage.setItem("recoveryEmail", email);
        localStorage.setItem("mfaToken", data.token);
        window.location.href = "mfa-username.html";
      } else {
        msg.className = "error";
        msg.innerText = data.message;
      }
    }
  </script>

  <footer class="cuny-footer">
    <div class="footer-inner">

      <div class="footer-links">
        <a href="#">Copyright 2025</a>
        <a href="#">Terms of Use</a>
        <a href="#">Security</a>
        <a href="#">Accessibility</a>
        <a href="#">CUNY IT Help</a>
      </div>

      <div class="footer-copy">
        © The City University of New York<br>
        All information entered on this page is encrypted and secure.
      </div>

      <div class="footer-social">
        <i class="fab fa-facebook-f"></i>
        <i class="fab fa-instagram"></i>
        <i class="fab fa-youtube"></i>
        <i class="fab fa-linkedin-in"></i>
        <i class="fas fa-ellipsis-h"></i>
      </div>

    </div>
  </footer>

</body>
</html>
