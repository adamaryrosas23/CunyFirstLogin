<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Tools – CUNYfirst</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="profile.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="cf-header">

 <div class="topbar">
    <div class="topbar-left">
        <span class="back-arrow" onclick="goBack()">
            &#8592;
        </span>
        <span class="topbar-title">Profile</span>
    </div>

    <div class="topbar-right">
        <input type="text" class="search-input" placeholder="Search in Menu">
        <span class="topbar-icon">&#128269;</span>
        <span class="topbar-icon">&#9776;</span>
    </div>
</div>


  <div class="cf-pagebar">
    <div class="cf-page-dropdown">Student Tools ▾</div>
    <div class="cf-page-nav">1 of 1</div>
  </div>

</header>

<!-- ================= MAIN CONTENT ================= -->
<main class="cf-wrapper">

  <div class="cf-grid">

    <div class="cf-card" onclick="openPage('schedule.html')">
      <div class="cf-card-title">Schedule Builder</div>
      <img src="icons/class.png" class="cf-card-icon-img">
    </div>

    <div class="cf-card" onclick="openPage('planning.html')">
      <div class="cf-card-title">Course Planning</div>
      <img src="icons/schedule.png" class="cf-card-icon-img">
    </div>

    <div class="cf-card" onclick="openPage('degreeworks.html')">
      <div class="cf-card-title">DegreeWorks</div>
      <img src="icons/degree.png" class="cf-card-icon-img">
    </div>

    <div class="cf-card" onclick="openPage('financial.html')">
      <div class="cf-card-title">Financial Account</div>
      <img src="icons/balance.png" class="cf-card-icon-img">
    </div>

    <div class="cf-card" onclick="openPage('aid.html')">
      <div class="cf-card-title">Financial Aid</div>
      <img src="icons/Tuition.png" class="cf-card-icon-img">
    </div>

    <div class="cf-card" onclick="openPage('transcript.html')">
      <div class="cf-card-title">Transcript</div>
      <img src="icons/summary.png" class="cf-card-icon-img">
    </div>

  </div>

</main>

<script>
function openPage(url) {
  window.location.href = url;
}

function goBack() {
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
