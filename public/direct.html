<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direct Deposit – CUNYfirst</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="profile.css">
</head>

<body>

<!-- ===== TOP BLUE BAR ===== -->
<div class="topbar">
    <div class="topbar-left">
        <span class="back-arrow" onclick="goBack()">&#8592;</span>
        <span class="topbar-title">Direct Deposit</span>
    </div>

    <div class="topbar-right">
        <input type="text" class="search-input" placeholder="Search in Menu">
        <span class="topbar-icon">&#128269;</span>
        <span class="topbar-icon">&#9776;</span>
    </div>
</div>

<!-- ===== MAIN CONTENT ===== -->
<main class="profile-wrapper">

  <section class="profile-content">

    <div class="profile-card">
      <h2 class="section-header">Direct Deposit Status</h2>

      <div class="info-grid">
        <div class="info-label">Enrollment Status:</div>
        <div class="info-value">Not Enrolled</div>

        <div class="info-label">Bank Name:</div>
        <div class="info-value">—</div>

        <div class="info-label">Account Number:</div>
        <div class="info-value">—</div>

        <div class="info-label">Routing Number:</div>
        <div class="info-value">—</div>
      </div>

      <h2 class="section-header">Enroll in Direct Deposit</h2>

      <button class="cf-button" onclick="openPage('direct_enroll.html')">Enroll Now</button>

    </div>

  </section>

</main>

<script>
function goBack() {
  window.location.href = "dashboard.html";
}

function openPage(url) {
  window.location.href = url;
}
</script>

</body>
</html>
